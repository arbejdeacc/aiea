<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#120a22"/>
  <rect width="512" height="512" rx="110" fill="#1e0f38" opacity="0.6"/>
  <!-- Purple glow circle behind A -->
  <circle cx="256" cy="230" r="155" fill="#2d1060" opacity="0.8"/>
  <!-- Bold A letter using paths -->
  <text x="256" y="310" text-anchor="middle" font-size="280" font-weight="900"
